<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planeador de Pintura</title>
    <style>
        :root {
            --bg-color: #1e1e24;
            --panel-bg: #2b2b36;
            --text-color: #e0e0e0;
            --accent: #00a8ff;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            gap: 20px;
            height: 100vh;
            box-sizing: border-box;
        }
        .sidebar {
            width: 320px;
            background-color: var(--panel-bg);
            padding: 20px;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            overflow-y: auto;
        }
        .main-area {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #121215;
            border-radius: 8px;
            overflow: hidden;
            padding: 20px;
        }
        canvas {
            max-width: 100%;
            max-height: 100%;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        label { display: block; font-size: 14px; margin-bottom: 5px; color: #aaa; }
        input[type="number"], input[type="range"] {
            width: 100%;
            padding: 8px;
            background: #1e1e24;
            border: 1px solid #444;
            color: white;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        button:hover { background-color: #008cd6; }
        button:disabled { background-color: #666; cursor: wait; }
        .file-input { margin-bottom: 10px; }
        .palette { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 10px; }
        .color-item { display: flex; flex-direction: column; align-items: center; }
        .color-number { font-size: 12px; color: #aaa; margin-bottom: 3px; }
        .color-swatch { width: 30px; height: 30px; border-radius: 4px; border: 1px solid #000; cursor: pointer; }
        .color-swatch:hover { border-color: #fff; }
        input[type="color"] { border: none; width: 0; height: 0; padding: 0; visibility: hidden; position: absolute; }
</style>
</head>
<body>

    <div class="sidebar">
        <h2>Controlos</h2>
        
        <input type="file" id="imageUpload" class="file-input" accept="image/*">
        
        <div>
            <label>Resolução (Células no lado maior):</label>
            <input type="number" id="resInput" value="50" min="10" max="150">
        </div>
        
        <div>
            <label>Máximo de Cores (K):</label>
            <input type="number" id="colorsInput" value="8" min="2" max="32">
        </div>

        <div>
            <label>Opacidade da Grelha:</label>
            <input type="range" id="gridOpacity" min="0" max="1" step="0.1" value="0.5">
        </div>
        
        <button id="processBtn">Processar Imagem</button>
        <button id="exportSvgBtn" style="background-color: #4CAF50;">Exportar SVG (Impressão)</button>

        <div>
            <label>Paleta Detetada:</label>
            <div id="paletteContainer" class="palette"></div>
        </div>
        <input type="color" id="colorPicker" value="#000000">
    </div>

    <div class="main-area">
        <canvas id="displayCanvas"></canvas>
    </div>

    <script>
        const imageUpload = document.getElementById('imageUpload');
        const displayCanvas = document.getElementById('displayCanvas');
        const ctx = displayCanvas.getContext('2d', { alpha: false });
        const resInput = document.getElementById('resInput');
        const colorsInput = document.getElementById('colorsInput');
        const gridOpacityInput = document.getElementById('gridOpacity');
        const processBtn = document.getElementById('processBtn');
        const exportSvgBtn = document.getElementById('exportSvgBtn');
        const paletteContainer = document.getElementById('paletteContainer');
        const colorPicker = document.getElementById('colorPicker');

        let originalImage = null;
        let currentGrid = new Uint8Array();
        let currentPalette = [];
        let customPalette = [];
        let paletteElements = [];
        let cols = 0;
        let rows = 0;
        let gridDrawQueued = false;
        let kMeansWorker = null;
        let kMeansRequestId = 0;
        let isProcessing = false;

        imageUpload.addEventListener('change', loadImageFile);
        processBtn.addEventListener('click', processImage);
        gridOpacityInput.addEventListener('input', scheduleDrawGrid);
        exportSvgBtn.addEventListener('click', exportSVG);
        colorPicker.addEventListener('change', handleColorPickerChange);

        function loadImageFile(event) {
            const file = event.target.files && event.target.files[0];
            if (!file) return;

            const url = URL.createObjectURL(file);
            const img = new Image();
            img.onload = () => {
                originalImage = img;
                URL.revokeObjectURL(url);
                processImage();
            };
            img.onerror = () => {
                URL.revokeObjectURL(url);
                alert('Não foi possível carregar esta imagem.');
            };
            img.src = url;
        }

        function processImage() {
            if (isProcessing || !originalImage || !originalImage.naturalWidth) return;

            const resMax = clamp(parseInt(resInput.value, 10), 10, 150);
            const k = clamp(parseInt(colorsInput.value, 10), 2, 32);

            const ratio = originalImage.naturalWidth / originalImage.naturalHeight;
            if (ratio >= 1) {
                cols = resMax;
                rows = Math.max(1, Math.round(resMax / ratio));
            } else {
                rows = resMax;
                cols = Math.max(1, Math.round(resMax * ratio));
            }

            const offCanvas = document.createElement('canvas');
            offCanvas.width = cols;
            offCanvas.height = rows;
            const offCtx = offCanvas.getContext('2d', { willReadFrequently: true });
            offCtx.imageSmoothingEnabled = true;
            offCtx.drawImage(originalImage, 0, 0, cols, rows);

            const imageData = offCtx.getImageData(0, 0, cols, rows);
            const pixels = new Uint8ClampedArray((imageData.width * imageData.height) * 3);
            let pixelOffset = 0;
            for (let i = 0; i < imageData.data.length; i += 4) {
                pixels[pixelOffset++] = imageData.data[i];
                pixels[pixelOffset++] = imageData.data[i + 1];
                pixels[pixelOffset++] = imageData.data[i + 2];
            }

            setProcessing(true);

            runKMeans(pixels, k)
                .then(({ centroids, assignments }) => {
                    currentPalette = centroidsToArrays(centroids, k);
                    customPalette = new Array(k);
                    currentGrid = assignments;
                    renderPaletteUI();
                    drawGrid();
                })
                .catch((error) => {
                    console.error(error);
                    alert('O processamento falhou. Tenta reduzir a resolução ou o número de cores.');
                })
                .finally(() => {
                    setProcessing(false);
                });
        }

        function setProcessing(value) {
            isProcessing = value;
            processBtn.disabled = value;
            exportSvgBtn.disabled = value;
            imageUpload.disabled = value;
            processBtn.textContent = value ? 'A processar...' : 'Processar Imagem';
        }

        function runKMeans(pixels, k) {
            try {
                const worker = getKMeansWorker();
                const requestId = ++kMeansRequestId;

                return new Promise((resolve, reject) => {
                    const onMessage = (event) => {
                        if (event.data.requestId !== requestId) return;
                        worker.removeEventListener('message', onMessage);
                        worker.removeEventListener('error', onError);
                        resolve(event.data);
                    };

                    const onError = (event) => {
                        kMeansWorker = null;
                        worker.removeEventListener('message', onMessage);
                        worker.removeEventListener('error', onError);
                        reject(new Error(event.message || 'Erro no worker de processamento.'));
                    };

                    worker.addEventListener('message', onMessage);
                    worker.addEventListener('error', onError);
                    worker.postMessage({ requestId, pixels, k, maxIterations: 12 }, [pixels.buffer]);
                });
            } catch (error) {
                try {
                    return Promise.resolve(kMeansSync(pixels, k));
                } catch (syncError) {
                    return Promise.reject(syncError);
                }
            }
        }

        function getKMeansWorker() {
            if (kMeansWorker) return kMeansWorker;

            const workerSource = `
self.onmessage = function(event) {
    const data = event.data;
    const pixels = data.pixels;
    const k = data.k;
    const maxIterations = data.maxIterations;
    const n = pixels.length / 3;
    const centroids = new Float32Array(k * 3);
    const assignments = new Uint8Array(n);
    const sums = new Float32Array(k * 3);
    const counts = new Uint32Array(k);

    for (let j = 0; j < k; j++) {
        const src = ((j * n) / k | 0) * 3;
        centroids[j * 3] = pixels[src];
        centroids[j * 3 + 1] = pixels[src + 1];
        centroids[j * 3 + 2] = pixels[src + 2];
    }

    for (let iter = 0; iter < maxIterations; iter++) {
        sums.fill(0);
        counts.fill(0);

        for (let i = 0; i < n; i++) {
            const p = i * 3;
            const r = pixels[p];
            const g = pixels[p + 1];
            const b = pixels[p + 2];

            let minDist = Infinity;
            let clusterIndex = 0;

            for (let j = 0; j < k; j++) {
                const c = j * 3;
                const dr = r - centroids[c];
                const dg = g - centroids[c + 1];
                const db = b - centroids[c + 2];
                const dist = dr * dr + dg * dg + db * db;

                if (dist < minDist) {
                    minDist = dist;
                    clusterIndex = j;
                }
            }

            assignments[i] = clusterIndex;
            const s = clusterIndex * 3;
            sums[s] += r;
            sums[s + 1] += g;
            sums[s + 2] += b;
            counts[clusterIndex]++;
        }

        let moved = false;

        for (let j = 0; j < k; j++) {
            const c = j * 3;

            if (counts[j] === 0) {
                const src = ((j * n) / k | 0) * 3;
                centroids[c] = pixels[src];
                centroids[c + 1] = pixels[src + 1];
                centroids[c + 2] = pixels[src + 2];
                moved = true;
                continue;
            }

            const nr = Math.round(sums[c] / counts[j]);
            const ng = Math.round(sums[c + 1] / counts[j]);
            const nb = Math.round(sums[c + 2] / counts[j]);

            if (nr !== centroids[c] || ng !== centroids[c + 1] || nb !== centroids[c + 2]) {
                moved = true;
            }

            centroids[c] = nr;
            centroids[c + 1] = ng;
            centroids[c + 2] = nb;
        }

        if (!moved) break;
    }

    self.postMessage({ requestId: data.requestId, centroids, assignments }, [centroids.buffer, assignments.buffer]);
};
`;

            const blob = new Blob([workerSource], { type: 'application/javascript' });
            kMeansWorker = new Worker(URL.createObjectURL(blob));
            return kMeansWorker;
        }

        function kMeansSync(pixels, k) {
            const n = pixels.length / 3;
            const centroids = new Float32Array(k * 3);
            const assignments = new Uint8Array(n);
            const sums = new Float32Array(k * 3);
            const counts = new Uint32Array(k);

            for (let j = 0; j < k; j++) {
                const src = ((j * n) / k | 0) * 3;
                centroids[j * 3] = pixels[src];
                centroids[j * 3 + 1] = pixels[src + 1];
                centroids[j * 3 + 2] = pixels[src + 2];
            }

            for (let iter = 0; iter < 12; iter++) {
                sums.fill(0);
                counts.fill(0);

                for (let i = 0; i < n; i++) {
                    const p = i * 3;
                    const r = pixels[p];
                    const g = pixels[p + 1];
                    const b = pixels[p + 2];

                    let minDist = Infinity;
                    let clusterIndex = 0;

                    for (let j = 0; j < k; j++) {
                        const c = j * 3;
                        const dr = r - centroids[c];
                        const dg = g - centroids[c + 1];
                        const db = b - centroids[c + 2];
                        const dist = dr * dr + dg * dg + db * db;

                        if (dist < minDist) {
                            minDist = dist;
                            clusterIndex = j;
                        }
                    }

                    assignments[i] = clusterIndex;
                    const s = clusterIndex * 3;
                    sums[s] += r;
                    sums[s + 1] += g;
                    sums[s + 2] += b;
                    counts[clusterIndex]++;
                }

                let moved = false;
                for (let j = 0; j < k; j++) {
                    const c = j * 3;
                    if (counts[j] === 0) continue;

                    const nr = Math.round(sums[c] / counts[j]);
                    const ng = Math.round(sums[c + 1] / counts[j]);
                    const nb = Math.round(sums[c + 2] / counts[j]);

                    if (nr !== centroids[c] || ng !== centroids[c + 1] || nb !== centroids[c + 2]) {
                        moved = true;
                    }

                    centroids[c] = nr;
                    centroids[c + 1] = ng;
                    centroids[c + 2] = nb;
                }

                if (!moved) break;
            }

            return { centroids, assignments };
        }

        function centroidsToArrays(centroids, k) {
            const result = [];
            for (let i = 0; i < k; i++) {
                result.push([
                    Math.round(centroids[i * 3]),
                    Math.round(centroids[i * 3 + 1]),
                    Math.round(centroids[i * 3 + 2])
                ]);
            }
            return result;
        }

        function clamp(value, min, max) {
            if (!Number.isFinite(value)) return min;
            return Math.min(max, Math.max(min, value));
        }

        function scheduleDrawGrid() {
            if (gridDrawQueued) return;
            gridDrawQueued = true;
            requestAnimationFrame(() => {
                gridDrawQueued = false;
                drawGrid();
            });
        }

        function drawGrid() {
            if (currentGrid.length === 0 || currentPalette.length === 0) return;

            const cellSize = Math.max(1, Math.floor(Math.min(800 / cols, 800 / rows)));
            const width = cols * cellSize;
            const height = rows * cellSize;

            if (displayCanvas.width !== width || displayCanvas.height !== height) {
                displayCanvas.width = width;
                displayCanvas.height = height;
            } else {
                ctx.clearRect(0, 0, width, height);
            }

            const image = ctx.createImageData(width, height);
            const imageData = image.data;

            for (let y = 0; y < rows; y++) {
                const rowOffset = y * cols;

                for (let x = 0; x < cols; x++) {
                    const color = currentPalette[currentGrid[rowOffset + x]];
                    const startX = x * cellSize;
                    const startY = y * cellSize;

                    for (let yy = 0; yy < cellSize; yy++) {
                        let pixelIndex = ((startY + yy) * width + startX) * 4;

                        for (let xx = 0; xx < cellSize; xx++) {
                            imageData[pixelIndex] = color[0];
                            imageData[pixelIndex + 1] = color[1];
                            imageData[pixelIndex + 2] = color[2];
                            imageData[pixelIndex + 3] = 255;
                            pixelIndex += 4;
                        }
                    }
                }
            }

            ctx.putImageData(image, 0, 0);

            const opacity = Number(gridOpacityInput.value);
            if (opacity > 0) {
                ctx.save();
                ctx.strokeStyle = `rgba(0, 0, 0, ${opacity})`;
                ctx.lineWidth = 1;
                ctx.beginPath();

                for (let x = 0; x <= cols; x++) {
                    const px = x * cellSize + 0.5;
                    ctx.moveTo(px, 0);
                    ctx.lineTo(px, height);
                }

                for (let y = 0; y <= rows; y++) {
                    const py = y * cellSize + 0.5;
                    ctx.moveTo(0, py);
                    ctx.lineTo(width, py);
                }

                ctx.stroke();
                ctx.restore();
            }

            if (cellSize >= 8) {
                ctx.save();
                ctx.font = `${cellSize * 0.4}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                for (let y = 0; y < rows; y++) {
                    const rowOffset = y * cols;

                    for (let x = 0; x < cols; x++) {
                        const color = currentPalette[currentGrid[rowOffset + x]];
                        const luma = 0.299 * color[0] + 0.587 * color[1] + 0.114 * color[2];
                        ctx.fillStyle = luma > 128 ? 'rgba(0,0,0,0.7)' : 'rgba(255,255,255,0.7)';
                        ctx.fillText(currentGrid[rowOffset + x] + 1, x * cellSize + cellSize / 2, y * cellSize + cellSize / 2);
                    }
                }

                ctx.restore();
            }
        }

        function renderPaletteUI() {
            paletteContainer.innerHTML = '';
            paletteElements = [];

            currentPalette.forEach((color, idx) => {
                const item = document.createElement('div');
                item.className = 'color-item';

                const num = document.createElement('span');
                num.className = 'color-number';
                num.textContent = idx + 1;

                const div = document.createElement('div');
                div.className = 'color-swatch';
                const customColor = customPalette[idx] !== undefined ? customPalette[idx] : color;
                div.style.backgroundColor = `rgb(${customColor[0]}, ${customColor[1]}, ${customColor[2]})`;
                div.title = `Clique para alterar Cor ${idx + 1}`;

                item.appendChild(num);
                item.appendChild(div);
                paletteContainer.appendChild(item);
                paletteElements[idx] = div;
            });

            paletteElements.forEach((swatch, idx) => {
                swatch.onclick = null;
                swatch.addEventListener('click', () => {
                    const customColor = customPalette[idx] !== undefined ? customPalette[idx] : currentPalette[idx];
                    const toHex = (n) => n.toString(16).padStart(2, '0');
                    colorPicker.value = `#${toHex(customColor[0])}${toHex(customColor[1])}${toHex(customColor[2])}`;
                    colorPicker.dataset.colorIndex = String(idx);
                    colorPicker.click();
                });
            });
        }

        function handleColorPickerChange(event) {
            const idx = parseInt(event.target.dataset.colorIndex, 10);
            if (Number.isNaN(idx) || !currentPalette[idx]) return;

            const hex = event.target.value.replace('#', '');
            const r = parseInt(hex.substr(0, 2), 16);
            const g = parseInt(hex.substr(2, 2), 16);
            const b = parseInt(hex.substr(4, 2), 16);
            const color = [r, g, b];

            currentPalette[idx] = color;
            customPalette[idx] = color;

            if (paletteElements[idx]) {
                paletteElements[idx].style.backgroundColor = `rgb(${r}, ${g}, ${b})`;
            }

            drawGrid();
        }

        function exportSVG() {
            if (currentGrid.length === 0) return alert('Processa uma imagem primeiro!');

            const cellSize = 20;
            const width = cols * cellSize;
            const height = rows * cellSize;
            const parts = [
                `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${width} ${height}" width="${width}" height="${height}">`,
                `<rect width="${width}" height="${height}" fill="#ffffff" />`
            ];

            for (let y = 0; y < rows; y++) {
                const rowOffset = y * cols;

                for (let x = 0; x < cols; x++) {
                    const id = currentGrid[rowOffset + x] + 1;
                    const cx = x * cellSize;
                    const cy = y * cellSize;

                    parts.push(`<rect x="${cx}" y="${cy}" width="${cellSize}" height="${cellSize}" fill="none" stroke="#000000" stroke-width="0.5" stroke-opacity="0.3"/>`);
                    parts.push(`<text x="${cx + cellSize / 2}" y="${cy + cellSize / 2}" font-family="Arial" font-size="${cellSize * 0.4}" fill="#000000" text-anchor="middle" dominant-baseline="central">${id}</text>`);
                }
            }

            parts.push('</svg>');

            const blob = new Blob([parts.join('\n')], { type: 'image/svg+xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'planeador_pintura.svg';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            setTimeout(() => URL.revokeObjectURL(url), 0);
        }
    </script>
</body>
</html>
